// ════ PATCH FUNCTIONS (surgical DOM — keyboard stays open) ════════════════════
function classGA(w){if(w<28)return{l:"PT extremo",color:"#C0392B",bg:"#FDECEA"};if(w<32)return{l:"Muito prem.",color:"#C0392B",bg:"#FDECEA"};if(w<34)return{l:"PT moderado",color:"#B84A00",bg:"#FEF3E2"};if(w<37)return{l:"PT tardio",color:"#9A7000",bg:"#FFFBEA"};if(w<42)return{l:"A termo",color:"#2E7D5C",bg:"#E8F5EF"};return{l:"Pós-termo",color:"#3B6EA5",bg:"#EBF2FC"};}
function calcAge(bdt){if(!bdt)return null;const d=Date.now()-new Date(bdt).getTime();if(d<0)return null;const tH=d/3600000;return{tH,days:Math.floor(tH/24),hrs:Math.floor(tH%24),dol:tH<24?1:tH<48?2:Math.min(Math.floor(tH/24)+1,90)};}
function calcIGC(igW,igD,tH){if(!igW||tH==null)return null;const tot=parseInt(igW)*7+(parseInt(igD)||0)+Math.floor(tH/24);return{w:Math.floor(tot/7),d:tot%7};}
function fmtH(h){if(h==null)return"";const hh=Math.floor(h),mm=Math.round((h-hh)*60);return hh+"h"+(mm>0?" "+mm+"min":"");}
function iT(t,h,k){if(h<=t[0].h)return t[0][k];if(h>=t[t.length-1].h)return t[t.length-1][k];for(let i=0;i<t.length-1;i++)if(h>=t[i].h&&h<=t[i+1].h){const r=(h-t[i].h)/(t[i+1].h-t[i].h);return t[i][k]+r*(t[i+1][k]-t[i][k]);}return t[0][k];}
function i1(t,h){if(h<=t[0].h)return t[0].v;if(h>=t[t.length-1].h)return t[t.length-1].v;for(let i=0;i<t.length-1;i++)if(h>=t[i].h&&h<=t[i+1].h){const r=(h-t[i].h)/(t[i+1].h-t[i].h);return t[i].v+r*(t[i+1].v-t[i].v);}return t[0].v;}
function interpN(dou){const p=NOMOPTS;if(dou<=p[0].dou)return{...p[0]};if(dou>=p[p.length-1].dou)return{...p[p.length-1]};for(let i=0;i<p.length-1;i++)if(dou>=p[i].dou&&dou<=p[i+1].dou){const t=(dou-p[i].dou)/(p[i+1].dou-p[i].dou);return{cuv:+(p[i].cuv+t*(p[i+1].cuv-p[i].cuv)).toFixed(1),cauA:+(p[i].cauA+t*(p[i+1].cauA-p[i].cauA)).toFixed(1),cauB:+(p[i].cauB+t*(p[i+1].cauB-p[i].cauB)).toFixed(1)};}}
function fentonI(tbl,w,d){const ww=Math.min(44,Math.max(22,Math.floor(w)));const dd=Math.min(6,Math.max(0,d||0));if(dd===0||ww>=44)return tbl[ww];return Math.round(tbl[ww]+(tbl[Math.min(44,ww+1)]-tbl[ww])*dd/7);}
function bellAuto(f){if(f.perforat||f.pneumoperiton)return 5;if(f.dic||f.shock)return 4;if((f.pneumat||f.portalgas)&&(f.thrombo||f.acidosis||f.hemody))return 3;if(f.portalgas||f.ascites)return 3;if(f.pneumat)return 2;if(f.bloodfrank)return 1;if((f.temp||f.apnea||f.letargy)&&(f.residue||f.distension||f.bloodocc))return 0;return null;}
function sarnatGrade(sc){const vals=Object.values(sc).filter(v=>v!==null);if(vals.length<4)return null;const cnt=[0,0,0];vals.forEach(v=>{if(v>=1&&v<=3)cnt[v-1]++;});let g;if(cnt[2]>=2||cnt[2]>cnt[1])g=3;else if(cnt[1]>=cnt[0])g=2;else g=1;if(sc.conv>=2&&g<2)g=2;return g;}
function gradeInfo(g){if(g===1)return{l:"EHI Grau I — Leve",c:"#9A7000",bg:"#FFFBEA"};if(g===2)return{l:"EHI Grau II — Moderada",c:"#B84A00",bg:"#FEF3E2"};if(g===3)return{l:"EHI Grau III — Grave",c:"#C0392B",bg:"#FDECEA"};return null;}
function dunn(g){const k=g/1000;return{cuv:+(k*1.5+5.5).toFixed(1),cauA:+(k*3+9).toFixed(1),cauB:+(k+7).toFixed(1)};}
function shuklaFn(dou){return{cuv:+(dou/2+1).toFixed(1),cauA:+(dou+2).toFixed(1),cauB:+(dou*0.6+2).toFixed(1)};}
function getFluid(igW,dol){const r=CLOHERTY.find(x=>igW>=x.min&&igW<=x.max);if(!r)return null;return dol===1?r.d1:dol===2?r.d2:dol<=7?r.d37:r.d7p;}
function chip(l,c,bg){return `<span style="display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600;background:${bg};color:${c}">${l}</span>`;}
function ck(){return '<svg width="9" height="7" viewBox="0 0 10 8"><path d="M1 4L4 7L9 1" stroke="white" stroke-width="2.2" fill="none" stroke-linecap="round"/></svg>';}
function getPD(){const p=S.pac,age=calcAge(p.birthDT),igW=parseInt(p.igW),igD=parseInt(p.igD)||0;const igc=(age&&igW)?calcIGC(igW,igD,age.tH):null;return{...p,age,igW:igW||null,igD,igc,cls:igW?classGA(igW):null,igcCls:igc?classGA(igc.w):null};}

// ════ PATIENT STORAGE (localStorage) ═════════════════════════════════════════
function loadPats(){try{return JSON.parse(localStorage.getItem('neo_patients')||'[]');}catch(e){return[];}}
function savePats(arr){try{localStorage.setItem('neo_patients',JSON.stringify(arr));}catch(e){}}
function autoLabel(pac){const parts=[];if(pac.nome)parts.push(pac.nome);if(pac.igW)parts.push(pac.igW+'s'+(pac.igD&&pac.igD!=='0'?'+'+pac.igD+'d':''));if(pac.peso)parts.push(pac.peso+'g');if(pac.sexo)parts.push(pac.sexo==='M'?'Masc':'Fem');if(pac.birthDT){const d=new Date(pac.birthDT);parts.push(d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}));}return parts.join(' · ')||'Paciente';}
function relTime(iso){const h=Math.floor((Date.now()-new Date(iso).getTime())/3600000);if(h<1)return'agora';if(h<24)return'há '+h+'h';const d=Math.floor(h/24);if(d===1)return'ontem';if(d<7)return'há '+d+' dias';return new Date(iso).toLocaleDateString('pt-BR');}
function saveCurrentPat(){const pats=loadPats();pats.unshift({id:Date.now().toString(),savedAt:new Date().toISOString(),label:autoLabel(S.pac),pac:{nome:"",...S.pac}});if(pats.length>30)pats.pop();savePats(pats);render();}
function loadPat(id){const p=loadPats().find(x=>x.id===id);if(p){S.pac={nome:'',...p.pac};S.pacOpen=false;nav('home');}}
function delPat(id){if(confirm('Apagar este paciente?')){savePats(loadPats().filter(x=>x.id!==id));render();}}

// ════ PATCH FUNCTIONS (surgical DOM updates — keyboard stays open) ══════════
function buildComputedSection(pd){
  if(!pd.age&&!pd.igc)return'';
  return `<div style="background:#F7F5F0;border-radius:12px;padding:12px;margin-top:12px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${pd.age?`<div><div style="font-size:10px;color:#718096;margin-bottom:3px">Idade cronológica</div><div style="font-size:18px;font-weight:800;color:#1A202C">${pd.age.days}d ${pd.age.hrs}h</div><div style="font-size:11px;color:#718096">${Math.floor(pd.age.tH)}h · ${pd.age.dol}º dia</div></div>`:''}${pd.igc?`<div><div style="font-size:10px;color:#718096;margin-bottom:3px">IGC atual</div><div style="font-size:18px;font-weight:800;color:${pd.igcCls.color}">${pd.igc.w}s+${pd.igc.d}d</div>${chip(pd.igcCls.l,pd.igcCls.color,pd.igcCls.bg)}</div>`:''}</div></div>`;
}
function pacChips(pd){
  return (pd.age?chip(pd.age.days+'d '+pd.age.hrs+'h','#90CDF4','rgba(144,205,244,.25)'):'')
    +(pd.igc?chip('IGC '+pd.igc.w+'s+'+pd.igc.d+'d',pd.igcCls.color,pd.igcCls.bg):'')
    +(pd.peso?chip(pd.peso+'g','#9AE6B4','rgba(154,230,180,.25)'):'')
    +(pd.sexo?chip(pd.sexo==='M'?'Masc':'Fem','#90CDF4','rgba(144,205,244,.15)'):'');
}
function patchPacForm(){
  const pd=getPD();
  const gb=document.getElementById('home-gabar');if(gb)gb.innerHTML=pd.igW?svgGA(pd.igW):'';
  const cp=document.getElementById('home-computed');if(cp)cp.innerHTML=buildComputedSection(pd);
  const cs=document.getElementById('home-pac-chips');if(cs)cs.innerHTML=pacChips(pd);
}
function patchFotoNomo(){
  const f=S.foto,h=parseFloat(f.hours)||0,b=parseFloat(f.bili)||0;
  const isPre=f.gaMode==='preterm',pRa=Math.min(f.pRisks.length,2);
  const tRK=f.tRisks.length===0?'lr':f.tRisks.length<=1?'mr':'hr';
  const el=document.getElementById('foto-nomo');
  if(el)el.innerHTML=isPre?svgPre(h,b,f.pGa,pRa):svgTerm(h,b,tRK);
}

  return `<div data-action="nav" data-val="home" style="background:linear-gradient(135deg,#1A202C,#2d3748);color:white;padding:11px 16px;display:flex;align-items:center;gap:10px;cursor:pointer"><div style="width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0">👶</div><div style="flex:1;min-width:0"><div style="font-size:9px;opacity:.6;letter-spacing:1px;text-transform:uppercase">Paciente · toque para editar</div>${has?`<div style="display:flex;gap:5px;flex-wrap:wrap">${pacChips(pd)}</div>`:`<div style="font-size:12px;opacity:.7">Sem dados</div>`}</div><div style="font-size:13px;opacity:.4">‹</div></div><div style="background:linear-gradient(135deg,#1a2e4a,#3B6EA5);padding:11px 16px;color:white;display:flex;align-items:center;gap:12px"><button data-action="nav" data-val="home" style="background:rgba(255,255,255,.18);border:none;color:white;width:44px;height:44px;border-radius:12px;font-size:22px;font-weight:700;flex-shrink:0">‹</button><div><div style="font-size:15px;font-weight:700">${title}</div>${sub?`<div style="font-size:11px;opacity:.7">${sub}</div>`:''}</div></div>`;

</div>${ig.result?igResult(ig.result):''}</div>`;
}
function igResult(r){
  const cls=classGA(r.igW);
  let h=`<div class="card" style="border:2px solid ${cls.color}30"><div class="lbl">Resultado</div><div style="font-size:28px;font-weight:800;color:${cls.color}">${r.igW}s+${r.igD}d</div><div style="margin:6px 0">${chip(cls.l,cls.color,cls.bg)} <span style="font-size:11px;color:#718096;margin-left:6px">${r.method}</span></div>${svgGA(r.igW)}`;
  if(r.weight&&r.sex){
    const tbl=FENTON[r.sex],p10=fentonI(tbl.p10,r.igW,r.igD),p50=fentonI(tbl.p50,r.igW,r.igD),p90=fentonI(tbl.p90,r.igW,r.igD),w=parseFloat(r.weight);
    const wc=w<p10?{l:'PIG',c:'#C0392B',bg:'#FDECEA'}:w>p90?{l:'GIG',c:'#3B6EA5',bg:'#EBF2FC'}:{l:'AIG',c:'#2E7D5C',bg:'#E8F5EF'};
    const mV=Math.max(p90*1.2,w*1.1),pW=Math.min(96,(w/mV)*100),p10p=(p10/mV)*100,p50p=(p50/mV)*100,p90p=(p90/mV)*100;
    h+=`<div style="margin-top:12px"><div style="font-size:12px;font-weight:600;color:#4A5568;margin-bottom:8px">Classificação ponderal — Fenton 2013</div><div style="font-size:22px;font-weight:800;color:${wc.c}">${chip(wc.l,wc.c,wc.bg)} ${w}g</div><div style="position:relative;height:12px;background:#F0EDE8;border-radius:6px;border:1px solid #E2DDD6;margin-top:10px"><div style="position:absolute;left:${p10p}%;width:${p90p-p10p}%;height:100%;background:#C8E6C9;border-radius:2px"></div><div style="position:absolute;left:${p10p}%;top:-2px;width:2px;height:16px;background:#E57373"></div><div style="position:absolute;left:${p50p}%;top:-2px;width:2px;height:16px;background:#90A4AE"></div><div style="position:absolute;left:${p90p}%;top:-2px;width:2px;height:16px;background:#42A5F5"></div><div style="position:absolute;left:calc(${pW}% - 4px);top:-3px;width:8px;height:18px;background:${wc.c};border-radius:3px;border:2px solid white;box-shadow:0 1px 3px rgba(0,0,0,.3)"></div></div><div style="display:flex;justify-content:space-between;margin-top:3px;font-size:10px"><span style="color:#E57373;font-weight:600">p10 ${p10}g</span><span style="color:#90A4AE">p50 ${p50}g</span><span style="color:#42A5F5;font-weight:600">p90 ${p90}g</span></div></div>`;
  }
  return h+'</div>';
}

// ════ FOTOTERAPIA ══════════════════════════════════════════════════════════════
function renderFoto(){
  const f=S.foto,pd=getPD(),isPre=f.gaMode==='preterm';
  const tRn=f.tRisks.length,pRa=Math.min(f.pRisks.length,2),tRK=tRn===0?'lr':tRn<=1?'mr':'hr';
  const rLC=isPre?(pRa===0?C.green:pRa===1?C.orange:C.red):(tRn===0?C.green:tRn<=1?C.orange:C.red);

function renderHidrica(){

function render(){
  const screens={home:renderHome,ig:renderIG,foto:renderFoto,hidrica:renderHidrica,ehi:renderEHI,bell:renderBell,cateteres:renderCateteres,transfusao:renderTransfusao,pacientes:renderPacientes,capurro:renderCapurro,ballard:renderBallard,io:renderIO,renal:renderRenal,pressao:renderPressao};

}
function nav(screen){
  S.screen=screen;
  if(screen==='ig'){const pd=getPD();if(pd.igW&&!S.ig.dirW){S.ig.dirW=String(pd.igW);S.ig.dirD=String(pd.igD||0);}if(pd.birthDT&&!S.ig.nasc){S.ig.nasc=pd.birthDT.split('T')[0];}if(pd.peso&&!S.ig.peso){S.ig.peso=S.pac.peso;}if(pd.sexo&&!S.ig.sexo){S.ig.sexo=S.pac.sexo;}}
  if(screen==='renal'){const pd=getPD();if(pd.igW&&!S.renal.ig)S.renal.ig=String(pd.igW);if(pd.age&&!S.renal.dol)S.renal.dol=String(pd.age.dol);}
  if(screen==='pressao'){const pd=getPD();if(pd.igW&&!S.pressao.ig)S.pressao.ig=String(pd.igW);if(pd.peso&&!S.pressao.peso)S.pressao.peso=S.pac.peso;if(pd.age&&!S.pressao.dol)S.pressao.dol=String(pd.age.dol);}
  if(screen==='foto'){const pd=getPD();if(pd.birthDT){const age=calcAge(pd.birthDT);if(age){S.foto.hAuto=age.tH;S.foto.hours=age.tH.toFixed(1);}}if(pd.igW){const g=pd.igW;S.foto.gaMode=g<35?'preterm':'term';if(g<35){const ga=g<24?'22-23':g<26?'24-25':g<28?'26-27':g<30?'28-29':g<32?'30-31':g<34?'32-33':'34';S.foto.pGa=ga;}}}
  if(screen==='transfusao'&&!S.tr.gaGroupSet&&getPD().igW){const g=getPD().igW;S.tr.gaGroup=g<28?'lt28':g<32?'28-31':g<37?'32-36':'ge37';S.tr.gaGroupSet=true;}
  render();window.scrollTo(0,0);
}
function calcIG(){
  const ig=S.ig,pd=getPD(),nasc=ig.nasc||pd.birthDT?.split('T')[0];
  if(!nasc){S.ig.err='Informe a data de nascimento';render();return;}
  let igW,igD,method;
  if(ig.tab==='direta'){igW=parseInt(ig.dirW);igD=parseInt(ig.dirD)||0;method='IG direta';if(isNaN(igW)||igW<22||igW>44){S.ig.err='IG inválida (22–44 semanas)';render();return;}}
  else if(ig.tab==='dum'){if(!ig.dum){S.ig.err='Informe a DUM';render();return;}const days=Math.round((new Date(nasc+'T12:00:00')-new Date(ig.dum+'T12:00:00'))/86400000);igW=Math.floor(days/7);igD=days%7;method='Pela DUM';if(igW<22||igW>44){S.ig.err='IG fora do intervalo';render();return;}}
  else{if(!ig.usgDate||!ig.usgW){S.ig.err='Informe data e IG da USG';render();return;}const days=Math.round((new Date(nasc+'T12:00:00')-new Date(ig.usgDate+'T12:00:00'))/86400000);const tot=parseInt(ig.usgW)*7+(parseInt(ig.usgD)||0)+days;igW=Math.floor(tot/7);igD=tot%7;method='Por USG';if(igW<22||igW>44){S.ig.err='IG fora do intervalo';render();return;}}
  const age=calcAge(pd.birthDT||(nasc+'T00:00'));
  S.ig.err='';S.ig.result={igW,igD,method,weight:ig.peso||pd.peso||null,sex:ig.sexo||pd.sexo||null,age};
  if(!S.pac.igW){S.pac.igW=String(igW);S.pac.igD=String(igD);}
  render();
}
function clearIG(){S.ig={tab:'direta',nasc:'',dum:'',usgDate:'',usgW:'',usgD:'',dirW:'',dirD:'',peso:'',sexo:'',result:null,err:''};render();}

function calcFoto(){
  const f=S.foto,b=parseFloat(f.bili),h=parseFloat(f.hours);
  if(isNaN(b)||b<0||isNaN(h)||h<0)return;
  const isPre=f.gaMode==='preterm',tRn=f.tRisks.length,pRa=Math.min(f.pRisks.length,2),tRK=tRn===0?'lr':tRn<=1?'mr':'hr';
  const rLbl=isPre?(pRa===0?'Sem fatores':pRa===1?'1 fator':'≥2 fatores'):(tRn===0?'Baixo Risco':tRn<=1?'Intermediário':'Alto Risco');
  const rCol=isPre?(pRa===0?C.green:pRa===1?C.orange:C.red):(tRn===0?C.green:tRn<=1?C.orange:C.red);
  let ph,ex,st;
  if(!isPre){ph=iT(PTH,h,tRK);ex=iT(ETH,h,tRK);st=Math.max(ph-2,0);}
  else{ph=Math.max(i1(PPH[f.pGa],h)-pRa,1);ex=Math.max(i1(PPE[f.pGa],h)-pRa,1);st=Math.max(ph-2,0);}
  let cond,cCol,cBg,intv=false;
  if(b>=ex){cond='⚠️ EXSANGUINEOTRANSFUSÃO';cCol='#7a0000';cBg='#fff0f0';}
  else if(b>=ph){cond='💡 INICIAR FOTOTERAPIA';cCol='#7a4800';cBg='#fffbf0';if(b>=ph+2||(isPre&&pRa>0))intv=true;}
  else if(b<=st){cond='🛑 SUSPENDER FOTOTERAPIA\n(BTS ≤ limiar de suspensão)';cCol='#1a5c35';cBg='#f0fff5';}
  else{cond='✅ CONDUTA EXPECTANTE\n('+(ph-b).toFixed(1)+' mg/dL abaixo do limiar)';cCol='#1a5c35';cBg='#f0fff5';}
  const bInfo=isPre?PREBANDS.find(x=>x.ga===f.pGa):null;
  S.foto.result={b,h,ph,ex,st,cond,cCol,cBg,intv,rLbl,rCol,bLbl:bInfo?.label||null,hAuto:f.hAuto,gaMode:f.gaMode,pRA:pRa};
  render();
}

function clearEHI(){S.ehi={sc:{consciencia:null,tono:null,postura:null,moro:null,succao:null,resp:null,pupila:null,conv:null,eeg:null},cA:{ig36:false,peso1800:false,idade6h:false},cB:{b1_ph:false,b1_be:false,b2_event:false,b2_ph:false,b2_apgar:false,b2_vpp:false}};render();}

function calcTrHb(){
  const tr=S.tr,hb=parseFloat(tr.hb);
  if(!tr.status||isNaN(hb)||hb<0)return;
  const base=HB_THR[tr.gaGroup]?.[tr.status];if(!base)return;
  let r=base.r,l=base.l;
  if(tr.adjHemo){r+=1;l+=1;}if(tr.adjSurg){r=Math.max(r,base.l);l+=1;}
  S.tr.result={computed:true,hb,r,l,ind:hb<=r,bord:hb>r&&hb<=r+1,adjHemo:tr.adjHemo,adjSurg:tr.adjSurg};
  render();
}

document.addEventListener('click',function(e){
  const el=e.target.closest('[data-action]');if(!el)return;
  const action=el.dataset.action,val=el.dataset.val,key=el.dataset.key;
  if(action==='nav'){nav(val);return;}
  if(action==='set'){setState(key,val==='null'?null:isNaN(Number(val))||val===''?val:val);return;}
  if(action==='toggle'){toggleBool(key);return;}
  if(action==='arr'){toggleArr(key,val);return;}
  if(action==='sex'){const cur=getS(key);setState(key,cur===val?'':val);return;}
  if(action==='sarnat'){setS('ehi.sc.'+el.dataset.key,el.dataset.val==='null'?null:parseInt(el.dataset.val));render();return;}
  if(action==='step'){const cur=parseFloat(getS(key)),step=parseFloat(el.dataset.step),min=parseFloat(el.dataset.min),max=parseFloat(el.dataset.max);setState(key,Math.max(min,Math.min(max,cur+step)));return;}
  if(action==='calc'){window[val]&&window[val]();return;}
  if(action==='scoreSet'){const mod=el.dataset.mod,field=el.dataset.field,val=el.dataset.val==='null'?null:parseInt(el.dataset.val);setScore(mod,field,val);return;}
  if(action==='loadpat'){loadPat(el.dataset.id);return;}
  if(action==='delpat'){delPat(el.dataset.id);return;}
});

// ════ UTILS — MÓDULOS NOVOS ═══════════════════════════════════════════════════
function getCrExp(igW,dol){
  const k=igW<28?"lt28":igW<32?"28-31":igW<35?"32-34":igW<37?"35-36":"term";
  const arr=CR_EXP[k],d=Math.min(Math.max(dol,1),28);
  let lo=0,hi=CR_DAYS.length-1;
  for(let i=0;i<CR_DAYS.length-1;i++){if(d>=CR_DAYS[i]&&d<=CR_DAYS[i+1]){lo=i;hi=i+1;break;}}
  if(lo===hi)return arr[lo];
  return+(arr[lo]+(arr[hi]-arr[lo])*(d-CR_DAYS[lo])/(CR_DAYS[hi]-CR_DAYS[lo])).toFixed(2);
}
function getHTNPerc(pma){return HTN_TBL.find(r=>pma>=r.p[0]&&pma<=r.p[1])||(pma<24?HTN_TBL[0]:HTN_TBL[HTN_TBL.length-1]);}
function getHypoMAP(peso,dol){
  const r=HYPO_W.find(x=>peso>=x.wMin&&peso<=x.wMax);if(!r)return null;
  if(dol<=1)return r.d1;if(dol<=3)return+(r.d1+(r.d3-r.d1)*(dol-1)/2).toFixed(0);
  if(dol<=7)return+(r.d3+(r.d7-r.d3)*(dol-3)/4).toFixed(0);return r.d7;
}
function capurroScore(){return CAPURRO_C.reduce((a,c)=>S.capurro[c.id]!==null?a+S.capurro[c.id]:a,0);}
function capurroFilled(){return CAPURRO_C.filter(c=>S.capurro[c.id]!==null).length;}
function ballardScore(){
  const all=[...BALLARD_N,...BALLARD_F];
  return all.reduce((a,c)=>{
    const id=c.id,v=S.ballard[id];
    return v!==null&&v!==undefined?a+v:a;
  },0);
}
function ballardFilled(){
  const all=[...BALLARD_N,...BALLARD_F];
  return all.filter(c=>S.ballard[c.id]!==null&&S.ballard[c.id]!==undefined).length;
}
function setScore(mod,field,val){
  const cur=S[mod][field];
  S[mod][field]=(cur===val)?null:val;
  render();
}
function clearCapurro(){S.capurro={pele:null,orelha:null,mama:null,mamilo:null,planta:null};render();}
function clearBallard(){S.ballard={sexo:S.ballard.sexo,postura:null,janela:null,recolhimento:null,popliteo:null,lenco:null,calcaneo:null,pelef:null,lanugem:null,plantaf:null,mamaf:null,olhoorelha:null,genital:null};render();}
function clearIO(){S.io={fio2:"",map:"",pao2:"",spo2:""};render();}
function clearRenal(){S.renal={tab:S.renal.tab,ig:"",comp:"",crS:"",crAt:"",crBas:"",du:"",dol:""};render();}
function clearPressao(){S.pressao={tab:S.pressao.tab,ig:"",peso:"",dol:"",map:"",sbpH:"",dbpH:"",signs:{},shockType:null,pma:"",sbp:"",dbp:""};render();}

  const osi=(fio2d>0&&mapN>0&&spo2N>0)?+(fio2d*mapN*100/spo2N).toFixed(1):null;

</div>`:''}
</div>`;
  }
  const inpField=(label,key,unit,placeholder,hint)=>`<div style="margin-bottom:12px">
<div style="font-size:12px;font-weight:600;color:#4A5568;margin-bottom:5px">${label}</div>

function renderRenal(){

  const k=igN<37?0.33:0.45,compN=parseFloat(r.comp),crSN=parseFloat(r.crS);
  const clcr=(compN>0&&crSN>0)?+(k*compN/crSN).toFixed(1):null;
  const crAtN=parseFloat(r.crAt),crBasN=parseFloat(r.crBas);
  const crExp=(igN>0&&dolN>0)?getCrExp(igN,dolN):null;
  const crRatio=(crAtN>0&&crBasN>0)?+(crAtN/crBasN).toFixed(2):null;
  const crDelta=(crAtN>0&&crBasN>0)?+(crAtN-crBasN).toFixed(2):null;
  function kdigoStage(){
    let sc=0,sd=0;
    if(crBasN>0&&crAtN>0){const ratio=crAtN/crBasN,delta=crAtN-crBasN;
      if(crAtN>=2.5||ratio>=3)sc=3;else if(ratio>=2)sc=2;else if(ratio>=1.5||delta>=0.3)sc=1;}
    const du=parseFloat(r.du);
    if(!isNaN(du)&&du>0){if(du<0.3)sd=3;else if(du<0.5)sd=2;else if(du<1.0)sd=1;}
    return Math.max(sc,sd);

  const stage=(crAtN>0&&crBasN>0)?kdigoStage():null;

  ];
  const ki=stage!==null?KDIGO_INFO[stage]:null;
  const tabBtn=(v,l)=>`<button data-action="set" data-key="renal.tab" data-val="${v}" style="flex:1;padding:11px 8px;border-radius:10px;font-size:13px;font-weight:${r.tab===v?700:600};border:${r.tab===v?`2px solid #3B6EA5`:'1.5px solid #E2DDD6'};background:${r.tab===v?'#EBF2FC':'#FAFAF8'};color:${r.tab===v?'#3B6EA5':'#718096'};cursor:pointer">${l}</button>`;
  const inp=(label,key,unit,placeholder,hint)=>`<div style="margin-bottom:12px">

  function gfrNormal(ig){return ig<26?"5–12":ig<30?"10–20":ig<34?"15–25":ig<37?"20–35":"25–45";}
  function clcrStatus(v,ig){const lo=ig<26?5:ig<30?10:ig<34?15:ig<37?20:25,hi=ig<26?12:ig<30?20:ig<34?25:ig<37?35:45;if(v>=lo&&v<=hi)return{l:"Dentro do esperado",c:"#2E7D5C",bg:"#E8F5EF"};if(v<lo)return{l:"Abaixo do esperado",c:"#B84A00",bg:"#FEF3E2"};return{l:"Acima do esperado",c:"#3B6EA5",bg:"#EBF2FC"};}
  return shdr('Função Renal Neonatal','Schwartz · KDIGO AWAKEN 2017')
    +`<div style="padding:16px">
<div style="display:flex;gap:8px;margin-bottom:16px">${tabBtn("clcr","🧮 ClCr / GFR")}${tabBtn("kdigo","📊 IRA / KDIGO")}</div>
${r.tab==="clcr"?`
<div style="background:#FDF3E0;border:1.5px solid #D4A04A40;border-radius:14px;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px">

// ════ RENDER — PRESSÃO ════════════════════════════════════════════════════════
function renderPressao(){
  const p=S.pressao,igN=parseInt(p.ig)||0,pesoN=parseFloat(p.peso)||0,dolN=parseInt(p.dol)||0;
  const mapN=parseFloat(p.map)||0,sbpHN=parseFloat(p.sbpH)||0,dbpHN=parseFloat(p.dbpH)||0;
  const mapCalc=(sbpHN>0&&dbpHN>0)?Math.round(dbpHN+(sbpHN-dbpHN)/3):null;
  const mapEf=mapN>0?mapN:mapCalc;
  const mapGA=igN>0?igN:null;
  const mapPeso=(pesoN>0&&dolN>0)?getHypoMAP(pesoN,dolN):null;
  const isHypoGA=mapGA&&mapEf&&mapEf<mapGA,isHypoPeso=mapPeso&&mapEf&&mapEf<mapPeso,isHypo=isHypoGA||isHypoPeso;
  const nSigns=Object.values(p.signs).filter(Boolean).length;
  const isShockDecomp=isHypo&&nSigns>=2,isShockComp=!isHypo&&nSigns>=2;
  const pmaN=parseInt(p.pma)||0,sbpN=parseFloat(p.sbp)||0,dbpN=parseFloat(p.dbp)||0;
  const mapHTN=(sbpN>0&&dbpN>0)?Math.round(dbpN+(sbpN-dbpN)/3):null;
  const perc=pmaN>=24?getHTNPerc(pmaN):null;
  function htnClass(){if(!sbpN||!dbpN||!perc)return null;if(sbpN>=perc.p99s||dbpN>=perc.p99d)return{stage:2,label:"Hipertensão Estágio 2",color:"#C0392B",bg:"#FDECEA",desc:`PAS ≥ p99 (${perc.p99s}) ou PAD ≥ p99 (${perc.p99d})`};if(sbpN>=perc.p95s||dbpN>=perc.p95d)return{stage:1,label:"Hipertensão Estágio 1",color:"#B84A00",bg:"#FEF3E2",desc:`PAS ≥ p95 (${perc.p95s}) ou PAD ≥ p95 (${perc.p95d})`};return{stage:0,label:"Pressão Normal",color:"#2E7D5C",bg:"#E8F5EF",desc:`PAS < p95 (${perc.p95s}) e PAD < p95 (${perc.p95d})`};}
  const htc=htnClass();
  const tabBtn=(v,l,col)=>`<button data-action="set" data-key="pressao.tab" data-val="${v}" style="flex:1;padding:11px 8px;border-radius:10px;font-size:12px;font-weight:${p.tab===v?700:600};border:${p.tab===v?`2px solid ${col}`:'1.5px solid #E2DDD6'};background:${p.tab===v?col+'22':'#FAFAF8'};color:${p.tab===v?col:'#718096'};cursor:pointer">${l}</button>`;
  const inp=(label,key,unit,placeholder,hint)=>`<div style="margin-bottom:12px">
<div style="font-size:12px;font-weight:600;color:#4A5568;margin-bottom:5px">${label}</div>
<div style="position:relative"><input class="inp" data-set="pressao.${key}" type="number" value="${p[key]}" placeholder="${placeholder}" inputmode="numeric" style="font-size:16px;font-weight:700;padding-right:${unit?52:12}px"/>
${unit?`<span style="position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:11px;color:#718096">${unit}</span>`:''}
</div>${hint?`<div style="font-size:10px;color:#718096;margin-top:3px">${hint}</div>`:''}</div>`;
  return shdr('Pressão Arterial Neonatal','Hipotensão · Choque · Hipertensão')
    +`<div style="padding:16px">
<div style="display:flex;gap:8px;margin-bottom:16px">${tabBtn("hypo","🔴 Hipotensão / Choque","#C0392B")}${tabBtn("htn","🟠 Hipertensão","#B84A00")}</div>
${p.tab==="hypo"?`
<div class="card"><div class="lbl">Dados</div>
<div style="display:flex;gap:10px">${['ig','dol'].map(k=>inp(k==='ig'?"IG ao nascer":"Dia de vida",k,k==='ig'?"s":"dv",k==='ig'?"28":"2",k==='ig'?"Define MAP mínima (regra MAP=IG)":"")).join('')}</div>
${inp("Peso","peso","g","1200","")}
<div style="border-top:1px dashed #E2DDD6;margin:12px 0"></div>
<div style="font-size:11px;font-weight:600;color:#4A5568;margin-bottom:10px">Pressão Arterial medida</div>
<div style="display:flex;gap:10px">${inp("PAS (sistólica)","sbpH","mmHg","55","")}${inp("PAD (diastólica)","dbpH","mmHg","32","")}</div>
${inp("PAM (deixe vazio para calcular auto)","map","mmHg","auto",mapCalc?`Calculada: ${mapCalc} mmHg`:"PAD + (PAS−PAD)/3")}
${mapEf>0?`<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px">
${mapGA?`<div style="flex:1;min-width:140px;background:${isHypoGA?'#FDECEA':'#E8F5EF'};border-radius:10px;padding:10px 14px;border:1.5px solid ${isHypoGA?'#C0392B40':'#2E7D5C40'}">
<div style="font-size:10px;color:${isHypoGA?'#C0392B':'#2E7D5C'}">Regra MAP = IG</div>
<div style="font-size:11px;font-weight:600;color:${isHypoGA?'#C0392B':'#2E7D5C'};margin-top:2px">PAM ${mapEf} ${isHypoGA?"<":"≥"} ${mapGA} mmHg</div>
<div style="font-size:14px;font-weight:800;color:${isHypoGA?'#C0392B':'#2E7D5C'}">${isHypoGA?"⚠️ Hipotensa":"✓ OK"}</div></div>`:''}
${mapPeso?`<div style="flex:1;min-width:140px;background:${isHypoPeso?'#FDECEA':'#E8F5EF'};border-radius:10px;padding:10px 14px;border:1.5px solid ${isHypoPeso?'#C0392B40':'#2E7D5C40'}">
<div style="font-size:10px;color:${isHypoPeso?'#C0392B':'#2E7D5C'}">Por peso/DOL</div>
<div style="font-size:11px;font-weight:600;color:${isHypoPeso?'#C0392B':'#2E7D5C'};margin-top:2px">PAM ${mapEf} ${isHypoPeso?"<":"≥"} ${mapPeso} mmHg</div>
<div style="font-size:14px;font-weight:800;color:${isHypoPeso?'#C0392B':'#2E7D5C'}">${isHypoPeso?"⚠️ Hipotensa":"✓ OK"}</div></div>`:''}
</div>`:''}
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<div class="lbl" style="margin-bottom:0">Sinais de Choque</div>
${nSigns>0?`<span style="background:${nSigns>=3?'#FDECEA':'#FEF3E2'};color:${nSigns>=3?'#C0392B':'#B84A00'};padding:2px 10px;border-radius:20px;font-size:12px;font-weight:700">${nSigns} presente${nSigns>1?"s":""}</span>`:''}
</div>
${SHOCK_S.map(s=>{const sel=p.signs[s.id];return`<button data-action="toggle" data-key="pressao.signs.${s.id}" style="display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border-radius:10px;cursor:pointer;text-align:left;border:1.5px solid ${sel?'#C0392B60':'#E2DDD6'};background:${sel?'#FDECEA':'#FAFAF8'};margin-bottom:6px;transition:all .15s">
<div style="width:22px;height:22px;border-radius:6px;flex-shrink:0;border:2px solid ${sel?'#C0392B':'#E2DDD6'};background:${sel?'#C0392B':'white'};display:flex;align-items:center;justify-content:center">${sel?ck():''}</div>
<span style="font-size:13px;color:${sel?'#1A202C':'#4A5568'};font-weight:${sel?600:400}">${s.icon} ${s.l}</span></button>`;}).join('')}
</div>
${(isShockDecomp||isShockComp||isHypo)?`<div style="background:${isShockDecomp?'#FDECEA':isShockComp?'#FEF3E2':'#FFFBEA'};border:2px solid ${isShockDecomp?'#C0392B':isShockComp?'#B84A00':'#9A7000'}40;border-radius:18px;padding:20px;margin-bottom:14px">
<div style="font-size:16px;font-weight:800;color:${isShockDecomp?'#C0392B':isShockComp?'#B84A00':'#9A7000'};margin-bottom:12px">${isShockDecomp?"🔴 CHOQUE DESCOMPENSADO":isShockComp?"🟡 CHOQUE COMPENSADO":"⚠️ HIPOTENSÃO"}</div>
<div style="background:rgba(255,255,255,.75);border-radius:12px;padding:12px 14px;font-size:12px;color:#1A202C;line-height:1.8">
${(isShockDecomp||isShockComp?["Acesso venoso urgente (CUV se RN)","SF 0,9% 10 ml/kg em 15–30 min (avaliar ECO antes se suspeita cardiogênico)","Repetir bolus até 30–60 ml/kg se hipovolêmico e sem sobrecarga","Dopamina 5–10 mcg/kg/min ou dobutamina 5–15 mcg/kg/min se sem resposta","Adrenalina 0,05–0,5 mcg/kg/min se refratário","Colher: HC, PCR, coagulograma, lactato","Hidrocortisona 1–2 mg/kg/dose se refratário a catecolaminas"]:["Confirmar medida: manguito adequado","Tratar causa (sépsis, hipovolemia, dor)","Ecocardiograma funcional se disponível","Monitorar sinais de choque a cada 15–30 min"]).map(t=>`• ${t}`).join('<br>')}
</div></div>`:''}
<div class="card" style="padding:14px"><div class="lbl">MAP mínima por peso/DOL</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:6px">${["Peso","D1","D3","D7"].map(h=>`<div style="font-size:10px;font-weight:700;color:#718096;text-align:center;padding:4px 0">${h}</div>`).join('')}</div>
${HYPO_W.map(r=>`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:4px;background:#F7F5F0;border-radius:8px;padding:8px 10px">
<div style="font-size:10px;color:#1A202C;font-weight:600">${r.label}</div>
${[r.d1,r.d3,r.d7].map(v=>`<div style="font-size:13px;font-weight:800;color:#C0392B;text-align:center">${v}</div>`).join('')}</div>`).join('')}
<div style="font-size:10px;color:#718096;margin-top:4px;font-style:italic">PAM (mmHg) · Nuntnarumit P et al. Clin Perinatol 1999</div></div>
<button class="btng" data-action="calc" data-val="clearPressao" style="width:100%;margin-bottom:4px">Limpar</button>`
:`<div style="background:#FDF3E0;border:1.5px solid #D4A04A40;border-radius:14px;padding:10px 14px;margin-bottom:14px;display:flex;gap:10px">
<span style="font-size:18px;flex-shrink:0">ℹ️</span>
<div style="font-size:12px;color:#7a5000;line-height:1.5">Hipertensão neonatal: PA > p95 para <b>IGC (PMA)</b>. Confirmar com ≥ 3 medidas, manguito adequado.</div></div>
<div class="card"><div class="lbl">Dados</div>
${inp("IGC — Idade Gestacional Corrigida (PMA em semanas)","pma","sem","38","IG ao nascer + semanas de vida = PMA")}
<div style="display:flex;gap:10px">${inp("PAS (sistólica)","sbp","mmHg","85","")}${inp("PAD (diastólica)","dbp","mmHg","55","")}</div>
${mapHTN?`<div style="background:#F7F5F0;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center">
<span style="font-size:12px;color:#718096">PAM calculada</span><span style="font-size:18px;font-weight:800;color:#4A5568">${mapHTN} mmHg</span></div>`:''}
</div>
${perc?`<div class="card" style="padding:14px"><div class="lbl">Percentis para PMA ${pmaN}s</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:4px">
${[["","p50","p95","p99"],["PAS",perc.p50s,perc.p95s,perc.p99s],["PAD",perc.p50d,perc.p95d,perc.p99d]].map(row=>row.map((cell,ci)=>`<div style="padding:8px 6px;text-align:center;background:${ci===2?'#FEF3E2':ci===3?'#FDECEA':'#F7F5F0'};border-radius:8px;color:${ci===2?'#B84A00':ci===3?'#C0392B':'#4A5568'};font-size:${ci===0&&row[0]!==''?13:ci===0?10:12}px;font-weight:${ci===0?600:800}">${cell}</div>`).join('')).flat().join('')}
</div></div>`:''}
${htc?`<div style="background:${htc.bg};border:2px solid ${htc.color}40;border-radius:18px;padding:20px;margin-bottom:14px">
<div style="font-size:11px;letter-spacing:2px;color:${htc.color};text-transform:uppercase;margin-bottom:10px;opacity:.8">Resultado</div>
<div style="font-size:22px;font-weight:800;color:${htc.color};margin-bottom:6px">${htc.label}</div>
<div style="font-size:12px;color:${htc.color};opacity:.85;margin-bottom:12px">${htc.desc}</div>
${[{l:"PAS medida",v:`${sbpN} mmHg`,c:sbpN>=perc?.p95s?'#C0392B':'#2E7D5C'},{l:"PAD medida",v:`${dbpN} mmHg`,c:dbpN>=perc?.p95d?'#C0392B':'#2E7D5C'},mapHTN?{l:"PAM",v:`${mapHTN} mmHg`,c:'#4A5568'}:null].filter(Boolean).map(rx=>`<div style="display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,.7);border-radius:8px;padding:8px 12px;margin-bottom:6px"><span style="font-size:12px;color:#718096">${rx.l}</span><span style="font-size:13px;font-weight:700;color:${rx.c}">${rx.v}</span></div>`).join('')}
${htc.stage>0?`<div style="background:rgba(255,255,255,.75);border-radius:12px;padding:12px 14px;margin-top:10px">
<div style="font-size:11px;font-weight:700;color:${htc.color};margin-bottom:8px">Conduta</div>
${(htc.stage===1?["Confirmar com ≥ 3 medidas em dias diferentes","Investigar causa: coarctação (4 membros), doença renal, trombose","Ecocardiograma funcional","Eletrólitos, creatinina, EAS","Considerar anti-hipertensivo se PAS > p99 ou sintomático"]:["Emergência hipertensiva — tratar com urgência","Labetalol EV 0,5–1 mg/kg/dose ou nicardipina 0,5–5 mcg/kg/min","Reduzir PA 25% nas primeiras 8h, 25% nas 24h seguintes","UTI — monitorização PA invasiva se possível","Investigar: coarctação, trombose aórtica/renal"]).map((t,i)=>`<div style="display:flex;gap:8px;margin-bottom:5px;align-items:flex-start">
<div style="width:20px;height:20px;border-radius:6px;flex-shrink:0;background:${htc.bg};border:1.5px solid ${htc.color}40;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:${htc.color}">${i+1}</div>
<div style="font-size:12px;color:#1A202C;line-height:1.5;padding-top:2px">${t}</div></div>`).join('')}</div>`:''}
</div>`:''}
<div class="card" style="padding:14px"><div class="lbl">Percentis PAS por PMA (Dionne 2012)</div>
<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:6px">${["PMA","p50","p95","p99"].map(h=>`<div style="font-size:10px;font-weight:700;color:#718096;text-align:center;padding:4px 0">${h}</div>`).join('')}</div>
${HTN_TBL.map(r=>`<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;margin-bottom:4px">${[`${r.p[0]}–${r.p[1]}s`,r.p50s,r.p95s,r.p99s].map((v,i)=>`<div style="padding:7px 6px;text-align:center;background:${i===0?'#F0EDE8':i===2?'#FEF3E2':i===3?'#FDECEA':'#F7F5F0'};border-radius:7px;color:${i===0?'#4A5568':i===2?'#B84A00':i===3?'#C0392B':'#1A202C'};font-size:${i===0?10:12}px;font-weight:${i===0?600:700}">${v}</div>`).join('')}</div>`).join('')}
<div style="font-size:9px;color:#718096;margin-top:6px;font-style:italic">PAS (mmHg) · Dionne JM et al. Pediatrics 2012</div></div>
<button class="btng" data-action="calc" data-val="clearPressao" style="width:100%;margin-bottom:4px">Limpar</button>`}
</div>`;
}

</script></body></html>
